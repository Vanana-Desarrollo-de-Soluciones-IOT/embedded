[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
lib_deps = 
	dfrobot/DFRobot_SCD4X@^1.0.1
	adafruit/Adafruit SSD1306@^2.5.16
	bblanchon/ArduinoJson@^7.2.2
